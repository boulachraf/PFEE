<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz Adventure</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f8ff; }
        #game { max-width: 400px; margin: 50px auto; padding: 20px; border: 2px solid #4CAF50; border-radius: 10px; background-color: white; }
        input, button { margin: 10px; padding: 10px; }
        #feedback { color: red; font-weight: bold; }
        #score { color: green; }
    </style>
</head>
<body>
    <div id="game">
        <h1>Math Quiz Adventure</h1>
        <p id="question">Loading question...</p>
        <input type="number" id="answer" placeholder="Your answer">
        <button onclick="submitAnswer()">Submit</button>
        <p id="feedback"></p>
        <p id="score">Score: 0 | Level: 1</p>
    </div>

    <script>
        let score = 0;
        let level = 1;
        let correctAnswer;

        async function loadQuestion() {
            const response = await fetch('/get_question?level=' + level);
            const data = await response.json();
            document.getElementById('question').textContent = data.question;
            correctAnswer = data.answer;
        }

        async function submitAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const response = await fetch('/check_answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answer: userAnswer, correct: correctAnswer })
            });
            const result = await response.json();
            document.getElementById('feedback').textContent = result.feedback;
            if (result.correct) {
                score += 10;
                level = Math.floor(score / 50) + 1; // Increase level every 50 points
            }
            document.getElementById('score').textContent = `Score: ${score} | Level: ${level}`;
            document.getElementById('answer').value = '';
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
